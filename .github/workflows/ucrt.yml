name: ucrt
on:
  push:
    branches:
      - '*'
  workflow_dispatch:

jobs:
  ucrt:
    strategy:
      fail-fast: false
    runs-on: windows-2022
    env:
      PRE: ruby-ucrt

    steps:
      - name: git config
        run: |
          git config --system core.autocrlf false
          git config --system core.eol lf

      - name: Checkout ruby-loco
        uses: actions/checkout@v3

      - name: get ruby and rubyinstaller2
        timeout-minutes: 5
        run: |
          $gh = 'https://github.com'
          git clone -q --depth=1 --no-tags --branch=master  $gh/oneclick/rubyinstaller2.git ./rubyinstaller2
          git clone -q --depth=1 --no-tags --branch=master  $gh/ruby/ruby.git               ./ruby

      - name: Set up Ruby & MSYS2
        timeout-minutes: 8
        uses: ruby/setup-ruby-pkgs@v1
        with:
          ruby-version: 3.2
          mingw: clang-15 rust

      - name: Configure bindgen
        shell: bash
        run: |
          : Configure bindgen for msys2

          msys_root=""

          if [ "$MSYSTEM" = "MINGW64" ]; then
            msys_root="c:/msys64/mingw64"
          elif [ "$MSYSTEM" = "UCRT64" ]; then
            msys_root="c:/msys64/ucrt64"
          else
            echo "Unknown MSYSTEM: $MSYSTEM, cannot configure bindgen"
            exit 1
          fi

          # We can't use llvm-16 just yet due to backwards compatibility issues, so we have to workaround for now
          echo MSYS_ROOT="$msys_root" >> $GITHUB_ENV
          echo LIBCLANG_PATH="$msys_root/opt/llvm-15/bin" >> $GITHUB_ENV

          echo "::info::Set LIBCLANG_PATH to $LIBCLANG_PATH"

      - name: Cache - .downloaded-cache
        uses: actions/cache@v3
        with:
          path: .downloaded-cache
          key: dl-cache-win-ucrt-${{ hashFiles('ruby/gems/bundled_gems') }}
          restore-keys: dl-cache-win-ucrt-

      - name: build & install
        timeout-minutes: 30
        run:  ./1_0_build_install_msys2_64.ps1 ucrt

      - name: test
        timeout-minutes: 70
        run:  ./2_0_test.ps1 ucrt

      - name: CLI Check Bash
        shell: bash
        run: ./cli_test_bash

      - name: upload asset
        timeout-minutes: 5
        uses: ./.github/actions/upload-binary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          ruby_path: ./${{ env.PRE }}

      - name: save log artifact
        if: success() || failure()
        uses: actions/upload-artifact@v1
        with:
          name: ${{ env.TEST_LOGS }}
          path: ./logs
